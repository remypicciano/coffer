name: Linux build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential pkg-config libx11-dev libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/coffer "dist/coffer-linux-${{ matrix.arch }}"
          chmod 755 "dist/coffer-linux-${{ matrix.arch }}"
          tar -C dist -czf "dist/coffer-linux-${{ matrix.arch }}.tar.gz" "coffer-linux-${{ matrix.arch }}"
          cd dist
          sha256sum "coffer-linux-${{ matrix.arch }}.tar.gz" > "coffer-linux-${{ matrix.arch }}.tar.gz.sha256"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: coffer-linux-${{ matrix.arch }}
          path: |
            dist/coffer-linux-${{ matrix.arch }}.tar.gz
            dist/coffer-linux-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
