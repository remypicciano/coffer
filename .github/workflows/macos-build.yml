name: macOS build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: aarch64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: macos-${{ matrix.arch }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build release executable
        run: cargo build --locked --release

      - name: Package executable and checksum
        run: |
          mkdir -p dist
          cp target/release/coffer "dist/coffer-macos-${{ matrix.arch }}"
          chmod 755 "dist/coffer-macos-${{ matrix.arch }}"
          tar -C dist -czf "dist/coffer-macos-${{ matrix.arch }}.tar.gz" "coffer-macos-${{ matrix.arch }}"
          cd dist
          shasum -a 256 "coffer-macos-${{ matrix.arch }}.tar.gz" > "coffer-macos-${{ matrix.arch }}.tar.gz.sha256"

      - name: Attest macOS archive provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/coffer-macos-${{ matrix.arch }}.tar.gz

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coffer-macos-${{ matrix.arch }}
          path: |
            dist/coffer-macos-${{ matrix.arch }}.tar.gz
            dist/coffer-macos-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
