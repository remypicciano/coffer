name: Windows build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: windows-x86_64

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked --target x86_64-pc-windows-msvc

      - name: Run Clippy
        run: cargo clippy --locked --target x86_64-pc-windows-msvc --all-targets --all-features -- -D warnings

      - name: Build release executable
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Package executable and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/coffer.exe dist/coffer-windows-x86_64.exe
          Compress-Archive -Path dist/coffer-windows-x86_64.exe -DestinationPath dist/coffer-windows-x86_64.zip
          $hash = (Get-FileHash dist/coffer-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  coffer-windows-x86_64.zip" | Set-Content -NoNewline dist/coffer-windows-x86_64.zip.sha256

      - name: Attest Windows archive provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/coffer-windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coffer-windows-x86_64
          path: |
            dist/coffer-windows-x86_64.zip
            dist/coffer-windows-x86_64.zip.sha256
          if-no-files-found: error
          retention-days: 14
